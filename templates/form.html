{% extends 'base.html' %}

{% block title %}{% if action == 'create' %}글쓰기{% else %}게시글 수정{% endif %} - 게시판{% endblock %}

{% block content %}
<div class="form-container">
    <h2>{% if action == 'create' %}새 게시글 작성{% else %}게시글 수정{% endif %}</h2>

    <form method="post">
        <div class="form-group">
            <label for="title">제목 <span class="required">*</span></label>
            <input type="text" id="title" name="title"
                   value="{{ post.get('title', '') if post is mapping else post.title }}"
                   placeholder="제목을 입력하세요" required>
        </div>

        <div class="form-group">
            <label for="author">작성자 <span class="required">*</span></label>
            <input type="text" id="author" name="author"
                   value="{{ post.get('author', '') if post is mapping else post.author }}"
                   placeholder="이름을 입력하세요" required>
        </div>

        <div class="form-group">
            <label for="content">내용 <span class="required">*</span></label>
            <textarea id="content" name="content" rows="12"
                      placeholder="내용을 입력하세요" required>{{ post.get('content', '') if post is mapping else post.content }}</textarea>
        </div>

        <div class="form-actions">
            {% if action == 'edit' %}
                <a href="{{ url_for('view_post', post_id=post_id) }}" class="btn btn-outline">취소</a>
            {% else %}
                <a href="{{ url_for('index') }}" class="btn btn-outline">취소</a>
            {% endif %}
            <button type="submit" class="btn btn-primary">
                {% if action == 'create' %}등록{% else %}수정완료{% endif %}
            </button>
        </div>
    </form>
</div>
{% endblock %}
