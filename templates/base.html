<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}게시판{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header>
        <div class="container">
            <h1><a href="{{ url_for('index') }}">📋 파이프라인</a></h1>
            <nav class="main-nav">
                <a href="{{ url_for('index') }}"
                   class="nav-tab {% if request.endpoint in ('index', 'view_post', 'create_post', 'edit_post') %}active{% endif %}">
                    게시판
                </a>
                <a href="{{ url_for('todos') }}"
                   class="nav-tab {% if request.endpoint in ('todos', 'add_todo', 'toggle_todo', 'delete_todo') %}active{% endif %}">
                    TODO
                </a>
                <a href="{{ url_for('faqs') }}"
                   class="nav-tab {% if request.endpoint in ('faqs', 'add_faq', 'edit_faq', 'delete_faq') %}active{% endif %}">
                    FAQ
                </a>
                <a href="{{ url_for('calendar') }}"
                   class="nav-tab {% if request.endpoint == 'calendar' %}active{% endif %}">
                    달력
                </a>
                <a href="{{ url_for('contacts') }}"
                   class="nav-tab {% if request.endpoint in ('contacts', 'add_contact', 'edit_contact', 'delete_contact') %}active{% endif %}">
                    연락처
                </a>
            </nav>
        </div>
    </header>

    <main class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="container">
            <p>Simple CRUD 게시판</p>
        </div>
    </footer>
</body>
</html>
